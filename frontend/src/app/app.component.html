<div *ngIf="paymentService.currentUserValue; else loginTemp" class="app-container">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="brand-section">
      <span class="brand-logo">💎</span>
      <h1 class="brand-name">PayFlow Certify</h1>
    </div>

    <nav>
      <ul class="nav-menu">
        <li>
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a class="nav-link" routerLink="/invoices" routerLinkActive="active">
            <span class="nav-icon">📄</span>
            <span>Invoices</span>
          </a>
        </li>
        <li>
          <a class="nav-link" routerLink="/certificates" routerLinkActive="active">
            <span class="nav-icon">🛡️</span>
            <span>Payment Certificates</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Simulator Settings Box -->
    <div class="simulator-box">
      <div class="simulator-title">Cert Approver Simulator</div>
      <div class="role-pills">
        <button 
          *ngFor="let role of roles"
          class="role-pill" 
          [class.active]="simService.currentRole() === role.code"
          (click)="changeRole(role.code)"
        >
          <span>{{ role.icon }}</span>
          <span>{{ role.name }}</span>
        </button>
      </div>
    </div>

    <!-- Logged in User Profile Info & Logout Button -->
    <div style="margin-top: auto; padding: 16px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 10px;">
      <div style="display: flex; flex-direction: column; gap: 2px;">
        <span style="font-size: 13px; font-weight: 700; color: #FFF;">{{ paymentService.currentUserValue.name }}</span>
        <span style="font-size: 11px; color: var(--cyan-color); font-weight: bold;">{{ paymentService.currentUserValue.role }}</span>
      </div>
      <button class="btn btn-secondary btn-sm" (click)="logout()" style="width: 100%; font-weight: bold; font-size: 11px; height: 28px; padding: 0;">
        🚪 Log Out
      </button>
    </div>
  </aside>

  <!-- Main Workstation -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<ng-template #loginTemp>
  <app-login></app-login>
</ng-template>
